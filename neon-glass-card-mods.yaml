# ═══════════════════════════════════════════════════════════
# HomeSense Neon-Glass — Card-Mod CSS Snippets
# Requires: card-mod (HACS)
# Install: https://github.com/thomasloven/lovelace-card-mod
#
# Usage: Include these styles in your dashboard cards
# via card-mod's `style:` block, or apply globally
# using the `frontend` configuration in your
# configuration.yaml
# ═══════════════════════════════════════════════════════════


# ── GLOBL CSS (frontend config) ──────────────────────────
# Add to configuration.yaml:
#
# frontend:
#   themes: !include_dir_merge_named themes
#   extra_module_url:
#     - /hacsfiles/lovelace-card-mod/card-mod.js
#
# Then add a "Custom: card-mod" dashboard card with type: custom:config-template-card
# or apply styles globally via the dashboard raw config:
#
# neon-glass-globals: &neon-glass-globals
#   style: |
#     /* inject into ha-card */
#     ha-card {
#       background: rgba(26, 33, 31, 0.70) !important;
#       backdrop-filter: blur(24px) !important;
#       -webkit-backdrop-filter: blur(24px) !important;
#       border: 1px solid rgba(60, 74, 70, 0.30) !important;
#       border-radius: 12px !important;
#       box-shadow: 0 0 15px rgba(57, 241, 219, 0.06) !important;
#       transition: background 300ms ease, box-shadow 300ms ease !important;
#     }
#     ha-card:hover {
#       background: rgba(36, 43, 42, 0.80) !important;
#       box-shadow: 0 0 20px rgba(57, 241, 219, 0.10) !important;
#     }


# ── GLASS CARD ────────────────────────────────────────────
# Base glassmorphism card style
# Apply to any card via card-mod:
glass-card: &glass-card
  style: |
    ha-card {
      background: rgba(26, 33, 31, 0.70) !important;
      backdrop-filter: blur(24px) !important;
      -webkit-backdrop-filter: blur(24px) !important;
      border: 1px solid rgba(60, 74, 70, 0.30) !important;
      border-radius: 12px !important;
      box-shadow: 0 0 15px rgba(57, 241, 219, 0.06) !important;
      transition: background 300ms ease, box-shadow 300ms ease !important;
      color: #dde4e1 !important;
    }
    ha-card:hover {
      background: rgba(36, 43, 42, 0.80) !important;
      box-shadow: 0 0 20px rgba(57, 241, 219, 0.10) !important;
    }

# ── ACTIVE GLOW CARD ─────────────────────────────────────
# For active/on state cards — adds neon teal glow
active-glow-card: &active-glow-card
  style: |
    ha-card {
      background: rgba(26, 33, 31, 0.70) !important;
      backdrop-filter: blur(24px) !important;
      -webkit-backdrop-filter: blur(24px) !important;
      border: 1px solid rgba(87, 241, 219, 0.20) !important;
      border-radius: 12px !important;
      box-shadow: 0 0 15px rgba(87, 241, 219, 0.15),
                  inset 0 0 15px rgba(87, 241, 219, 0.05) !important;
      color: #57f1db !important;
      transition: all 300ms ease !important;
      position: relative !important;
      overflow: hidden !important;
    }
    ha-card::before {
      content: '' !important;
      position: absolute !important;
      top: -20px !important;
      right: -20px !important;
      width: 80px !important;
      height: 80px !important;
      background: rgba(87, 241, 219, 0.10) !important;
      border-radius: 50% !important;
      filter: blur(30px) !important;
      pointer-events: none !important;
    }

# ── INACTIVE CARD ─────────────────────────────────────────
# For off/disabled state cards — dimmed and muted
inactive-card: &inactive-card
  style: |
    ha-card {
      background: rgba(9, 16, 14, 0.50) !important;
      backdrop-filter: blur(24px) !important;
      -webkit-backdrop-filter: blur(24px) !important;
      border: 1px solid rgba(60, 74, 70, 0.15) !important;
      border-radius: 12px !important;
      box-shadow: none !important;
      color: #859490 !important;
      opacity: 0.70 !important;
      transition: all 300ms ease !important;
    }
    .icon-state {
      color: #859490 !important;
    }

